name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist/ matches committed build
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::dist/ está desactualizado respecto al build fresco. Corre 'npm run build' y commitea el resultado antes de publicar/taguear."
            git diff --stat -- dist
            exit 1
          fi
